<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login - CKD App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="container">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Doctor Login</h1>
                    <p>Access your consultation dashboard</p>
                </div>

                {% if error %}
                <div class="alert alert-danger">
                    <strong>Error:</strong> {{ error }}
                </div>
                {% endif %}

                <form method="POST" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your doctor email" required />
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required />
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="background: #0f766e;">Doctor Login</button>
                </form>

                <div class="auth-footer">
                    <p>New doctor? <a href="{{ url_for('doctor_register') }}" class="link">Register here</a></p>
                    <p>Patient account? <a href="{{ url_for('login') }}" class="link">Patient Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="middle-footer"><span>© {{ current_year if current_year is defined else 2026 }} CKD Care</span></div>
</body>
</html>
